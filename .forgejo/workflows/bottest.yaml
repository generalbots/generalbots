name: Bottest CI
on:
  push:
    branches: [main]
env:
  CARGO_TARGET_DIR: /opt/gbo/work/target
  PATH: /home/gbuser/.cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
jobs:
  build:
    runs-on: gbo
    steps:
      - name: Setup
        run: |
          cd /opt/gbo/work/generalbots
          git reset --hard HEAD
          git clean -fd
          git pull
      - name: Test
        run: |
          cd /opt/gbo/work/generalbots
          CARGO_BUILD_JOBS=4 cargo test -p bottest
