[package]
name = "bottimeseries"
version = "6.3.0"
edition = "2021"
description = "General Bots time-series metrics service (InfluxDB-compatible)"
license = "AGPL-3.0"
authors = ["Pragmatismo.com.br", "General Bots Community"]
repository = "https://github.com/GeneralBots/BotServer"

[dependencies]
botlib = { path = "../botlib", features = ["http-client"] }
chrono = { workspace = true, features = ["serde", "clock"] }
log = { workspace = true }
reqwest = { workspace = true, features = ["rustls-tls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }

[lints]
workspace = true
