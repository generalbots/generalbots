[package]
name = "botsheet"
version = "6.3.0"
edition = "2021"
license = "AGPL-3.0"
authors = ["Pragmatismo.com.br", "General Bots Community"]
repository = "https://github.com/GeneralBots/BotServer"

[dependencies]
botlib = { workspace = true }
botsheet-core = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
uuid = { workspace = true, features = ["v4"] }
axum = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "macros", "rt"] }
futures-util = { workspace = true }
log = { workspace = true }
regex = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true, features = ["thread_rng"] }
async-trait = { workspace = true }
umya-spreadsheet = { workspace = true, optional = true }
rust_xlsxwriter = { workspace = true, optional = true }
calamine = { workspace = true, optional = true }

[features]
default = ["xlsx"]
xlsx = ["dep:umya-spreadsheet", "dep:rust_xlsxwriter", "dep:calamine"]

[lints]
workspace = true
