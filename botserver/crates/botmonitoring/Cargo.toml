[package]
name = "botmonitoring"
version = "6.3.0"
edition = "2021"
description = "General Bots monitoring, metrics collection, alerting, and distributed tracing"
license = "AGPL-3.0"
authors = ["Pragmatismo.com.br", "General Bots Community"]
repository = "https://github.com/GeneralBots/BotServer"

[features]
default = []
monitoring = ["dep:sysinfo"]

[dependencies]
axum = { workspace = true }
chrono = { workspace = true, features = ["serde", "clock"] }
hex = { workspace = true }
log = { workspace = true }
rand = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sysinfo = { workspace = true, optional = true }
tokio = { workspace = true, features = ["sync", "time", "rt", "macros", "io-util", "fs"] }
uuid = { workspace = true, features = ["serde", "v4"] }

[lints]
workspace = true
