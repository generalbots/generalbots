[package]
name = "botchannels"
version = "6.3.0"
edition = "2021"
description = "General Bots social media channel integrations"
license = "AGPL-3.0"
authors = ["Pragmatismo.com.br", "General Bots Community"]
repository = "https://github.com/GeneralBots/BotServer"

[dependencies]
botchannels-core = { path = "../botchannels-core" }
async-trait = { workspace = true }
base64 = { workspace = true }
chrono = { workspace = true, features = ["serde", "clock"] }
hex = { workspace = true }
hmac = { workspace = true }
log = { workspace = true }
reqwest = { workspace = true, features = ["rustls-tls", "json", "multipart"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha1 = { workspace = true }
sha2 = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt"] }
urlencoding = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4"] }

[lints]
workspace = true
