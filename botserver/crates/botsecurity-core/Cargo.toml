[package]
name = "botsecurity-core"
version = "6.3.0"
edition = "2021"
description = "General Bots security core: guards, sanitizers, validators"
license = "AGPL-3.0"
authors = ["Pragmatismo.com.br", "General Bots Community"]
repository = "https://github.com/GeneralBots/BotServer"

[dependencies]
botlib = { path = "../../../botlib", features = ["http-client"] }
anyhow = { workspace = true }
axum = { workspace = true, features = ["ws", "macros"] }
base64 = { workspace = true }
chrono = { workspace = true, features = ["serde", "clock"] }
diesel = { workspace = true, features = ["postgres", "r2d2"] }
futures-util = { workspace = true }
hex = { workspace = true }
hmac = { workspace = true }
log = { workspace = true }
rand = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true, features = ["rustls-tls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }
tower-http = { workspace = true, features = ["cors"] }
tracing = { workspace = true }
url = { workspace = true }
urlencoding = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4"] }
governor = { workspace = true }
rustls = { workspace = true }

[lints]
workspace = true
