[package]
name = "botsecurity"
version = "6.3.0"
edition = "2021"
description = "General Bots security infrastructure (facade crate)"
license = "AGPL-3.0"
authors = ["Pragmatismo.com.br", "General Bots Community"]
repository = "https://github.com/GeneralBots/BotServer"

[features]
default = []
cache = ["botsecurity-auth/cache"]
directory = []

[dependencies]
botsecurity-core = { path = "../botsecurity-core" }
botsecurity-crypto = { path = "../botsecurity-crypto" }
botsecurity-auth = { path = "../botsecurity-auth" }
botsecurity-protection = { path = "../botsecurity-protection" }
anyhow = { workspace = true }
reqwest = { workspace = true, features = ["rustls-tls"] }
tracing = { workspace = true }

[lints]
workspace = true
