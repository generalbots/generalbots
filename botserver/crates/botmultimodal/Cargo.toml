[package]
name = "botmultimodal"
version = "6.3.0"
edition = "2021"
description = "General Bots multimodal AI client (image, video, audio, speech)"
license = "AGPL-3.0"
authors = ["Pragmatismo.com.br", "General Bots Community"]
repository = "https://github.com/GeneralBots/BotServer"

[dependencies]
botlib = { path = "../../../botlib", features = ["http-client"] }
log = { workspace = true }
reqwest = { workspace = true, features = ["rustls-tls", "json", "multipart"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs"] }
uuid = { workspace = true, features = ["serde", "v4"] }

[lints]
workspace = true
