[package]
name = "botvibe"
version = "6.3.0"
edition = "2021"
license = "AGPL-3.0"
authors = ["Pragmatismo.com.br", "General Bots Community"]
repository = "https://github.com/GeneralBots/BotServer"

[features]
default = []

[dependencies]
botlib = { workspace = true }
botautotask = { workspace = true }
botcontacts = { workspace = true }
botdeployment = { workspace = true }
diesel = { workspace = true, features = ["postgres", "r2d2", "chrono", "serde_json", "uuid"] }
r2d2 = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
uuid = { workspace = true, features = ["v4", "serde"] }
log = { workspace = true }
tokio = { workspace = true, features = ["rt", "sync", "macros", "time"] }
axum = { workspace = true }
thiserror = { workspace = true }
futures = { workspace = true }
