[package]
name = "botdrive"
version = "6.3.1"
edition = "2021"

[features]
default = []
vectordb = ["dep:botqdrant"]
sheet = ["dep:calamine"]
drive = ["dep:pdf-extract"]
research = []
llm = []

[dependencies]
botcore = { path = "../botcore" }
botlib = { path = "../../../botlib" }
botschema = { path = "../../../botschema" }
botqdrant = { path = "../botqdrant", optional = true }
axum = { workspace = true, features = ["ws", "macros"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["full"] }
diesel = { workspace = true, features = ["postgres", "r2d2", "chrono", "serde_json", "uuid"] }
chrono = { workspace = true, features = ["clock", "std"] }
uuid = { workspace = true, features = ["v4", "serde"] }
log = { workspace = true }
anyhow = { workspace = true }
reqwest = { workspace = true, features = ["rustls-tls", "json"] }
rust-s3 = { workspace = true }
regex = { workspace = true }
zip = { workspace = true }
calamine = { workspace = true, optional = true }
pdf-extract = { workspace = true, optional = true }
tracing = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
http = "1.4"
url = "2.5"
time = { version = "0.3", default-features = false, features = ["formatting", "macros", "parsing"] }

[lints]
workspace = true
