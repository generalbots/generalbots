[package]
name = "botanalytics"
version = "6.3.0"
edition = "2021"
description = "General Bots analytics, insights, OKR goals tracking, and reporting"
license = "AGPL-3.0"
authors = ["Pragmatismo.com.br", "General Bots Community"]
repository = "https://github.com/GeneralBots/BotServer"

[features]
default = []
goals = []
llm = []

[dependencies]
axum = { workspace = true }
bigdecimal = { workspace = true, features = ["serde"] }
chrono = { workspace = true, features = ["serde", "clock"] }
diesel = { workspace = true, features = ["postgres", "r2d2", "uuid", "chrono", "serde_json", "numeric"] }
log = { workspace = true }
r2d2 = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }
uuid = { workspace = true, features = ["serde", "v4"] }

[lints]
workspace = true
